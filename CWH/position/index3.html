<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .parent
        {
            border: 2px solid purple;
            margin: 30px;
            padding: 30px;
            position: relative; 
        }

        .box {
            border: 2px solid black;
            width: 80vw;
            height: 133px;
            padding: 0;
            margin: 5px;
        }

        .box1 {
            background-color: aqua;
            position: absolute; /* find nearest relative */
            top: -93px;
            left: 140px;
        }

        .box2 {
            background-color: red;
            /*position: relative;
            top: -67px;
            left: 40px;
            z-index: -1;*/
        }

        .box3 {
            background-color: green;
        }

        .box4 {
            background-color: blue;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
