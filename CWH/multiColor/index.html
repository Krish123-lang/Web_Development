<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: red;
        }

        ul li {
            list-style: none;
            display: inline-block;
            padding: 20px;
            font-weight: 800;
        }

        ul li a {
            text-decoration: none;
            color: white;
        }

        .right {
            list-style: none;
            padding: 20px;
            font-weight: 800;
            float: right;
        }

        .right a {
            text-decoration: none;
            color: white;
            padding-right: 20px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>

                <div class="right">
                    <a href="#">Register</a>
                    <a href="#">Logout</a>
                </div>
            </ul>
        </nav>
    </header>
</body>

</html>
