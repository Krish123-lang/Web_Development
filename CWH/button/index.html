<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <style>
        .button1 {
            border: 2px solid red;
            border-radius: 5px;
            padding: 5px;
            background-color: burlywood;
            color: red;
            cursor: pointer;
        }

        .button1:hover {
            color: black;
            background-color: aquamarine;
            border-color: blue;
        }

        .linkButton {
            border: 2px solid red;
            border-radius: 5px;
            padding: 5px;
            background-color: burlywood;
            color: red;
            cursor: pointer;
            text-decoration: none;
        }

        .button2 {
            box-shadow: 2px 2px yellow;
            padding: 5px;
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>
    <button class="button1">Button</button>
    <a href="#" class="linkButton">Link button</a>
    <button class="button2">Shadow button</button>
</body>

</html>
