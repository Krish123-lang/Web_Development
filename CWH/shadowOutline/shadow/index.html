<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shadow</title>
    <style>
        div {
            border: 2px solid;
            width: 100px;
            height: 100px;
            text-align: center;
            line-height: 100px;

            box-shadow: 5px 5px 5px #888;
        }

        p.tShadow{
            text-shadow: 10px 10px 5px red;
            outline: 2px solid;
            outline-offset: 20px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="box">
        i am a div
    </div>
    <p class="tShadow">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Deserunt, facilis.</p>
</body>

</html>
