<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            border: 2px solid;
            height: 500px;
            
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .box {
            height: 80px;
            width: 80px;
            border: 2px solid;
            margin: 2px;
            background-color: blueviolet;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
</body>

</html>
