<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinators</title>
    <style>
        div p {
            color: green;
        }

        div section p {
            color: aqua;
        }

        /* obly selects the first child of the div i.e <p> here */
        div>p {
            color: wheat;
            background-color: rebeccapurple;
        }
    </style>
</head>

<body>
    <div>
        <p>para 1</p>
        <p>para 2</p>

        <section>
            <p>para3</p>
            <p>para4</p>
        </section>
    </div>

    <p>para 5</p>
    <p>para 6</p>
</body>

</html>
