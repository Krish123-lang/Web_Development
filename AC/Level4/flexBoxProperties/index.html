<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties</title>
    <style>
        body{
            text-align: center;
        }
        #container{
            width: 800px;
            height: 200px;
            border: 2px solid;
            
            display: flex; /* it also removes the magical 'margins' from between */
        }
        div{
            border: 2px solid;
            width: 50px;
            height: 50px;
            display: inline-block;
            line-height: 50px;

            justify-content: space-evenly;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="box1">Box1</div>
        <div id="box2">Box2</div>
        <div id="box3">Box3</div>
        <div id="box4">Box4</div>
        <div id="box5">Box5</div>
    </div>
</body>

</html>
