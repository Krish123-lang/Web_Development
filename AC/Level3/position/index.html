<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: blueviolet;
            margin: 5px;
            display: inline-block;
            border: 2px solid green;
            border-radius: 5px;
        }

        #box1{
            /* static is default. Top,right,bottom,left,z-index does'nt works */
            position: static;
        }

        #box2{
            position: relative;
            top: 20px;
            left: 20px;
        }

        #box3{
            position: absolute;
            top: 50px;
        }

        #box4{
            position: fixed;
            bottom: 10px;
        }
    </style>
</head>

<body>
    <div id="box1">box1</div>
    <div id="box2">box2</div>
    <div id="box3">box3</div>
    <div id="box4">box4</div>
</body>

</html>
